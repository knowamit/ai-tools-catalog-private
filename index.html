<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tools Catalog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --border: #e7e5e4;
      --border-dark: #a8a29e;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #c2410c;
      --accent-light: #fff7ed;
    }

    ::selection { background: #fed7aa; color: #1c1917; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 0 24px;
    }

    .site-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: normal;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .site-title span {
      color: var(--accent);
    }

    .header-meta {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      min-height: calc(100vh - 80px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 40px 32px 40px 0;
      position: sticky;
      top: 0;
      height: fit-content;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .filter-list {
      list-style: none;
    }

    .filter-list li {
      margin-bottom: 2px;
    }

    .filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      padding: 5px 10px 5px 0;
      width: 100%;
      text-align: left;
      border-radius: 3px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      color: var(--accent);
      font-weight: 500;
    }

    .filter-count {
      font-size: 11px;
      color: var(--border-dark);
      margin-left: auto;
    }

    .filter-btn.active .filter-count { color: var(--accent); opacity: 0.6; }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .total-count {
      font-size: 12px;
      color: var(--muted);
    }

    .total-count strong {
      font-size: 28px;
      font-family: Georgia, serif;
      color: var(--text);
      letter-spacing: -0.04em;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }

    /* ── MAIN ── */
    main {
      padding: 40px 0 40px 48px;
    }

    .main-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .main-heading {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: normal;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      width: 200px;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--border-dark);
      pointer-events: none;
    }

    /* ── TOOL CARD ── */
    .tools-grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 24px;
      align-items: start;
      transition: border-color 0.15s;
      margin-bottom: 8px;
    }

    .tool-card:hover { border-color: var(--border-dark); }

    .tool-card.hidden { display: none; }

    .tool-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .tool-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .tool-name a {
      color: inherit;
      text-decoration: none;
    }

    .tool-name a:hover { color: var(--accent); }

    .tool-category {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 7px;
      border-radius: 2px;
    }

    .tool-desc {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 680px;
    }

    .tool-url {
      font-size: 11px;
      color: var(--border-dark);
      text-decoration: none;
      letter-spacing: 0.02em;
      white-space: nowrap;
      padding-top: 3px;
    }

    .tool-url:hover { color: var(--accent); }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #86efac;
      margin-left: 4px;
      vertical-align: middle;
    }

    .status-dot.pending { background: #fcd34d; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none;
      padding: 60px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 40px;
      margin-top: 40px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-inner a {
      color: var(--muted);
      text-decoration: none;
    }

    .footer-inner a:hover { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 0 20px;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 24px 0;
        position: static;
      }

      main { padding: 24px 0; }

      header { padding: 0 20px; }

      .header-inner { flex-direction: column; gap: 4px; }

      .main-header { flex-direction: column; gap: 16px; align-items: flex-start; }

      footer { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">AI Tools<span>.</span>Catalog</div>
    <div class="header-meta">Curated by Amit &mdash; Updated Apr 2026</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="total-count">
      <strong id="visible-count">22</strong>
      tools listed
    </div>

    <hr class="sidebar-divider" />

    <div class="sidebar-label">Filter by category</div>
    <ul class="filter-list" id="filter-list">
      <li><button class="filter-btn active" data-filter="all">All <span class="filter-count" id="count-all"></span></button></li>
    </ul>
  </aside>

  <main>
    <div class="main-header">
      <h1 class="main-heading">All Tools</h1>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="search" placeholder="Search tools…" id="search-input" />
      </div>
    </div>

    <div class="tools-grid" id="tools-grid">
      <!-- Cards injected by JS -->
    </div>

    <div class="empty-state" id="empty-state">No tools match your search.</div>
  </main>
</div>

<footer>
  <div class="footer-inner">
    <span>Open catalog &mdash; adding tools as they ship.</span>
    <a href="https://github.com/knowamit/ai-tools-catalog-private" target="_blank" rel="noopener">View on GitHub &rarr;</a>
  </div>
</footer>

<script>
  const TOOLS = [
    {
      name: "skills.sh",
      category: "AI coding workflow",
      url: "https://skills.sh/",
      description: "Directory and learning surface for reusable skills that improve agent workflows and coding operations.",
      status: "active"
    },
    {
      name: "Remotion",
      category: "AI video/content stack",
      url: "https://www.remotion.dev/",
      description: "React-based framework for generating videos programmatically; useful for automated content and video production.",
      status: "active"
    },
    {
      name: "gstack",
      category: "AI app starter stack",
      url: "https://github.com/garrytan/gstack",
      description: "Opinionated AI app starter template for shipping AI products faster.",
      status: "active"
    },
    {
      name: "OpenArt Suite",
      category: "AI creative tools",
      url: "https://openart.ai/suite/",
      description: "AI toolkit for image generation, editing, and branded creative asset production.",
      status: "active"
    },
    {
      name: "everything-claude-code",
      category: "Agent optimization system",
      url: "https://github.com/affaan-m/everything-claude-code",
      description: "Toolkit for improving AI coding agents with skills, memory, security, and research-first workflows.",
      status: "active"
    },
    {
      name: "Paperclip AI",
      category: "Multi-agent business ops",
      url: "https://github.com/paperclipai/paperclip",
      description: "Platform for orchestrating teams of AI agents to run business workflows from one dashboard.",
      status: "active"
    },
    {
      name: "Pollinations.ai",
      category: "Multi-modal AI platform",
      url: "https://pollinations.ai/",
      description: "Free open-source platform offering simple API access to state-of-the-art models for image, text, audio, and video generation — no signup required, with free compute for developers.",
      status: "active"
    },
    {
      name: "Drizz",
      category: "AI QA/testing",
      url: "https://www.drizz.dev/",
      description: "Vision AI mobile app testing agent for QA automation and regression coverage.",
      status: "active"
    },
    {
      name: "Claude Architect Guide",
      category: "AI learning resource",
      url: "https://x.com/hooeem/status/2033198345045336559",
      description: "Comprehensive guide to becoming a Claude Architect — covers Claude Code, Claude Agent SDK, Claude API, and Model Context Protocol (MCP) for building production-grade AI applications.",
      status: "active"
    },
    {
      name: "Variant",
      category: "AI UI design",
      url: "https://variant.com/",
      description: "AI design tool that generates endless UI variations by scrolling — type any app idea and explore multiple visual directions; export as HTML or React.",
      status: "active"
    },
    {
      name: "21st.dev",
      category: "AI agent infrastructure",
      url: "https://21st.dev/",
      description: "Developer platform for building and deploying AI agents at scale, with an Agents SDK, pre-built UI components, spend limits, sandbox execution, and observability.",
      status: "active"
    },
    {
      name: "AI Engineering from Scratch",
      category: "AI learning resource",
      url: "https://github.com/rohitg00/ai-engineering-from-scratch",
      description: "Hands-on curriculum covering LLMs, agents, RAG, fine-tuning, and production deployment — for engineers transitioning into AI roles.",
      status: "active"
    },
    {
      name: "Underestimating AI",
      category: "AI perspective/essay",
      url: "https://tinyclouds.org/underestimating-ai/",
      description: "Essay by Ryan Dahl (creator of Node.js and Deno) arguing that AI capabilities are consistently underestimated by developers and the tech industry.",
      status: "active"
    },
    {
      name: "smux",
      category: "AI/dev tooling",
      url: "https://github.com/ShawnPana/smux/",
      description: "Terminal session multiplexer for managing multiple concurrent AI agent sessions and dev processes from a single terminal window.",
      status: "active"
    },
    {
      name: "Tinker",
      category: "AI experimentation platform",
      url: "https://thinkingmachines.ai/tinker/",
      description: "AI sandbox and experimentation platform by Thinking Machines — lets teams prototype, test, and iterate on AI solutions without heavy engineering setup.",
      status: "active"
    },
    {
      name: "iii.dev",
      category: "AI developer tools",
      url: "https://iii.dev/",
      description: "Developer tooling and infrastructure for building and deploying AI-powered applications.",
      status: "active"
    },
    {
      name: "agents.md",
      category: "AI agent specification",
      url: "https://agents.md/",
      description: "Open specification and convention for defining AI agent behavior and capabilities in a standardized markdown format — like README.md but for agents.",
      status: "active"
    },
    {
      name: "browser-use",
      category: "AI browser automation",
      url: "https://browser-use.com/",
      description: "Python library that lets AI agents control a real browser — navigate, click, fill forms, and extract data — enabling full web automation for LLM-powered workflows.",
      status: "active"
    },
    {
      name: "Auto Research",
      category: "Research automation",
      url: null,
      description: "Placeholder — confirm the exact product URL to finalize this entry.",
      status: "pending"
    },
    {
      name: "The Well",
      category: "AI research dataset",
      url: "https://polymathic-ai.org/the_well/",
      description: "15TB collection of physics simulation datasets by Polymathic AI for machine learning research and scientific foundation model benchmarking.",
      status: "active"
    },
    {
      name: "LLM Wiki",
      category: "AI/dev tooling",
      url: "https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f",
      description: "Karpathy\u2019s pattern for building persistent LLM-maintained knowledge bases that compile and integrate information incrementally instead of retrieving from raw sources repeatedly.",
      status: "active"
    },
    {
      name: "Goose",
      category: "AI agent infrastructure",
      url: "https://goose-docs.ai/docs/getting-started/installation",
      description: "Open-source AI agent by Block that automates engineering tasks through a desktop and CLI interface with support for multiple LLM providers.",
      status: "active"
    },
    {
      name: "Caveman",
      category: "Agent optimization system",
      url: "https://github.com/JuliusBrussee/caveman",
      description: "Claude Code skill that reduces output tokens by ~75% by making AI responses terse and direct while maintaining full technical accuracy.",
      status: "active"
    }
  ];

  const activeCats = new Set();
  TOOLS.forEach(t => activeCats.add(t.category));

  // Build category filter buttons
  const filterList = document.getElementById("filter-list");
  const categories = [...activeCats];
  categories.forEach(cat => {
    const count = TOOLS.filter(t => t.category === cat).length;
    const li = document.createElement("li");
    li.innerHTML = `<button class="filter-btn" data-filter="${cat}">${cat} <span class="filter-count">${count}</span></button>`;
    filterList.appendChild(li);
  });

  // Set "All" count
  document.getElementById("count-all").textContent = TOOLS.filter(t => t.status !== "pending").length;

  // Render cards
  const grid = document.getElementById("tools-grid");

  function renderCard(tool) {
    const div = document.createElement("div");
    div.className = "tool-card";
    div.dataset.category = tool.category;
    div.dataset.search = (tool.name + " " + tool.category + " " + tool.description).toLowerCase();

    const urlDisplay = tool.url
      ? tool.url.replace(/^https?:\/\//, "").replace(/\/$/, "")
      : "URL pending";

    div.innerHTML = `
      <div>
        <div class="tool-name-row">
          <span class="tool-name">
            ${tool.url ? `<a href="${tool.url}" target="_blank" rel="noopener">${tool.name}</a>` : tool.name}
          </span>
          <span class="tool-category">${tool.category}</span>
          <span class="status-dot ${tool.status === 'pending' ? 'pending' : ''}"></span>
        </div>
        <p class="tool-desc">${tool.description}</p>
      </div>
      <div>
        ${tool.url
          ? `<a class="tool-url" href="${tool.url}" target="_blank" rel="noopener">${urlDisplay} &rarr;</a>`
          : `<span class="tool-url">${urlDisplay}</span>`}
      </div>
    `;

    return div;
  }

  TOOLS.forEach(tool => grid.appendChild(renderCard(tool)));

  // Filter logic
  let activeFilter = "all";

  function applyFilters() {
    const q = document.getElementById("search-input").value.toLowerCase().trim();
    let visible = 0;

    document.querySelectorAll(".tool-card").forEach(card => {
      const catMatch = activeFilter === "all" || card.dataset.category === activeFilter;
      const searchMatch = !q || card.dataset.search.includes(q);
      const show = catMatch && searchMatch;
      card.classList.toggle("hidden", !show);
      if (show) visible++;
    });

    document.getElementById("visible-count").textContent = visible;
    document.getElementById("empty-state").style.display = visible === 0 ? "block" : "none";
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  document.getElementById("search-input").addEventListener("input", applyFilters);
</script>
</body>
</html>
